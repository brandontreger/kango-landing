<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kango Construction — Coming Soon</title>
    <meta name="description" content="Kango Construction — Construction management software built for the field. Coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --slate-950: #0a0f1a;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --amber-500: #f59e0b;
            --amber-400: #fbbf24;
            --white: #f8fafc;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--slate-950);
            color: var(--white);
            overflow: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            padding: 2rem;
        }

        /* Blueprint grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px),
                linear-gradient(rgba(148, 163, 184, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.02) 1px, transparent 1px);
            background-size:
                100px 100px,
                100px 100px,
                20px 20px,
                20px 20px;
            animation: gridFade 2s ease-out forwards;
        }

        @keyframes gridFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Amber accent line at top */
        .accent-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--amber-500), var(--amber-400), var(--amber-500));
            animation: barGrow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            width: 0;
        }

        @keyframes barGrow {
            to { width: 100%; }
        }

        /* Corner marks — architectural drawing style */
        .corner-mark {
            position: fixed;
            width: 40px;
            height: 40px;
            opacity: 0;
            animation: cornerIn 0.6s ease-out forwards;
        }
        .corner-mark::before,
        .corner-mark::after {
            content: '';
            position: absolute;
            background: var(--slate-600);
        }
        .corner-mark::before {
            width: 1px;
            height: 100%;
        }
        .corner-mark::after {
            width: 100%;
            height: 1px;
        }
        .corner-mark.tl { top: 24px; left: 24px; animation-delay: 0.8s; }
        .corner-mark.tl::before { left: 0; top: 0; }
        .corner-mark.tl::after { left: 0; top: 0; }
        .corner-mark.tr { top: 24px; right: 24px; animation-delay: 0.9s; }
        .corner-mark.tr::before { right: 0; top: 0; }
        .corner-mark.tr::after { right: 0; top: 0; }
        .corner-mark.bl { bottom: 24px; left: 24px; animation-delay: 1.0s; }
        .corner-mark.bl::before { left: 0; bottom: 0; }
        .corner-mark.bl::after { left: 0; bottom: 0; }
        .corner-mark.br { bottom: 24px; right: 24px; animation-delay: 1.1s; }
        .corner-mark.br::before { right: 0; bottom: 0; }
        .corner-mark.br::after { right: 0; bottom: 0; }

        @keyframes cornerIn {
            to { opacity: 1; }
        }

        .content {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 640px;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
        }

        .logo-mark .bar {
            width: 3px;
            height: 28px;
            background: var(--amber-500);
            border-radius: 2px;
        }

        .logo-mark span {
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--slate-400);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 8vw, 5.5rem);
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
        }

        h1 .highlight {
            background: linear-gradient(135deg, var(--amber-400), var(--amber-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--slate-400);
            max-width: 480px;
            margin: 0 auto 3rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.2rem;
            background: var(--slate-900);
            border: 1px solid var(--slate-800);
            border-radius: 100px;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
        }

        .status .dot {
            width: 8px;
            height: 8px;
            background: var(--amber-500);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
        }

        .status span {
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--slate-300);
        }

        .app-link {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
        }

        .app-link a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            color: var(--slate-950);
            background: linear-gradient(135deg, var(--amber-400), var(--amber-500));
            padding: 0.75rem 1.75rem;
            border-radius: 100px;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .app-link a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.25);
        }

        .app-link a svg {
            width: 16px;
            height: 16px;
        }

        .contact {
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
        }

        .contact a {
            color: var(--slate-400);
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .contact a:hover {
            color: var(--amber-400);
            border-bottom-color: var(--amber-400);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle noise overlay */
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        @media (max-width: 480px) {
            .corner-mark { display: none; }
            .content { padding: 0 0.5rem; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="noise"></div>
    <div class="accent-bar"></div>

    <div class="corner-mark tl"></div>
    <div class="corner-mark tr"></div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>

    <main class="page">
        <div class="content">
            <div class="logo-mark">
                <div class="bar"></div>
                <span>Kango Construction</span>
            </div>

            <h1>Building<br><span class="highlight">Smarter</span></h1>

            <p class="tagline">
                Construction management software built for the field.
                Budgets, bids, daily reports, and schedules — all in one place.
            </p>

            <div class="status">
                <div class="dot"></div>
                <span>Coming Soon</span>
            </div>

            <div class="app-link">
                <a href="https://app.kangoconstruction.com">
                    Go to App
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
            </div>

        </div>
    </main>

    <footer style="position: relative; z-index: 1; border-top: 1px solid #1e293b; padding: 2rem; text-align: center;">
        <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
            <a href="/privacy.html" style="color: #94a3b8; font-size: 0.85rem; text-decoration: none; transition: color 0.3s ease;">Privacy Policy</a>
            <a href="/terms.html" style="color: #94a3b8; font-size: 0.85rem; text-decoration: none; transition: color 0.3s ease;">Terms of Use</a>
        </div>
        <p style="color: #475569; font-size: 0.8rem; margin-top: 0.75rem;">&copy; 2026 Kango Construction. All rights reserved.</p>
    </footer>
</body>
</html>
